                const saved = localStorage.getItem("easytech_completed_steps");
                if (saved) {
                    try {
                        setCompletedSteps(JSON.parse(saved));
                    } catch (e) {
                        console.error("Failed to parse saved progress");
                    }
                }
            }, []);

            // Save completed steps to localStorage when updated
            const toggleStep = (guideId, stepIndex, event) => {
                event.stopPropagation(); // Prevent card from toggling
                const key = `${guideId}-${stepIndex}`;
                const updated = {
                    ...completedSteps,
                    [key]: !completedSteps[key]
                };
                setCompletedSteps(updated);
                localStorage.setItem("easytech_completed_steps", JSON.stringify(updated));
            };

            // Reset checklist progress
            const resetProgress = () => {
                if (confirm("האם ברצונך לאפס את כל הסימונים שביצעת במדריך?")) {
                    setCompletedSteps({});
                    localStorage.removeItem("easytech_completed_steps");
                }
            };

            // Filter guides by Category and Search Query
            const filteredGuides = useMemo(() => {
                return guidesData.filter(guide => {
                    const matchesCategory = selectedCategory === "all" || guide.category === selectedCategory;
                    const matchesSearch = searchQuery === "" || 
                        guide.title.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        guide.steps.some(step => step.toLowerCase().includes(searchQuery.toLowerCase()));
                    return matchesCategory && matchesSearch;
                });
            }, [selectedCategory, searchQuery]);

            // Total completion stats for the gamified progress bar
            const stats = useMemo(() => {
                let totalSteps = 0;
                let completedCount = 0;
                
                filteredGuides.forEach(guide => {
                    guide.steps.forEach((_, idx) => {
                        totalSteps++;
                        if (completedSteps[`${guide.id}-${idx}`]) {
                            completedCount++;
                        }
                    });
                });

                return {
                    total: totalSteps,
                    completed: completedCount,
                    percent: totalSteps > 0 ? Math.round((completedCount / totalSteps) * 100) : 0
                };
            }, [filteredGuides, completedSteps]);

            // Text size styles mapping
            const sizeClasses = {
                sm: {
                    title: "text-base",
                    body: "text-sm",
                    stepNum: "w-5 h-5 text-xs"
                },
                md: {
                    title: "text-lg md:text-xl",
                    body: "text-base md:text-lg",
                    stepNum: "w-7 h-7 text-sm"
                },
                lg: {
                    title: "text-xl md:text-2xl",
                    body: "text-lg md:text-xl",
                    stepNum: "w-8 h-8 text-base"
                },
                xl: {
                    title: "text-2xl md:text-3xl",
                    body: "text-xl md:text-2xl",
                    stepNum: "w-9 h-9 text-lg"
                }
            };

            // Text To Speech implementation
            const toggleSpeech = (guideId, title, steps, event) => {
                event.stopPropagation(); // Avoid card toggle
                
                if (!('speechSynthesis' in window)) {
                    alert("מצטערים, המכשיר שלך לא תומך בהקראת קולית בדפדפן זה.");
                    return;
                }

                if (speakingId === guideId) {
                    window.speechSynthesis.cancel();
                    setSpeakingId(null);
                    return;
                }

                // Stop any current speech
                window.speechSynthesis.cancel();

                // Format steps into a natural speaking flow
                const formattedSpeech = `${title}. ` + steps.map((step, index) => `שלב ${index + 1}: ${step}`).join(". ");
                
                const utterance = new SpeechSynthesisUtterance(formattedSpeech);
                utterance.lang = 'he-IL';
                utterance.rate = 0.85; // Calmer and slower speech rate for clarity

                utterance.onend = () => setSpeakingId(null);
                utterance.onerror = () => setSpeakingId(null);

                setSpeakingId(guideId);
                window.speechSynthesis.speak(utterance);
            };

            // Stop speech when component unmounts or navigates away
            useEffect(() => {
                return () => {
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                    }
                };
            }, []);

            return (
                <div class="max-w-md mx-auto bg-[#F4F7F6] min-h-screen flex flex-col shadow-xl border-x border-gray-200 relative pb-40">
                    
                    {/* Top Native-Feel Header */}
                    <header class="bg-gradient-to-r from-[#2C5E53] to-[#3B7D6E] text-white pt-6 pb-5 px-5 rounded-b-[2rem] shadow-md sticky top-0 z-50">
                        <div class="flex items-center justify-between mb-3">
                            <div class="flex items-center gap-3">
                                <div class="bg-white/20 p-2 rounded-xl text-xl">📱</div>
                                <div>
                                    <h1 class="text-xl font-bold tracking-tight">פשוט וקל</h1>
                                    <p class="text-xs text-emerald-100 font-light">מדריך הכיס הדיגיטלי שלך</p>
                                </div>
                            </div>
                            
                            {/* Font size control button */}
                            <div class="flex items-center bg-black/10 rounded-lg p-1 gap-1">
                                <button 
                                    onClick={() => setTextSize(prev => prev === "sm" ? "md" : prev === "md" ? "lg" : prev === "lg" ? "xl" : "sm")}
                                    class="text-xs px-2 py-1 bg-white/20 hover:bg-white/30 rounded font-bold transition-all"
                                    title="שנה גודל כתב"
                                >
                                    כתב: {textSize.toUpperCase()}
                                </button>
                            </div>
                        </div>

                        {/* Search Bar Input */}
                        <div class="relative mt-2">
                            <span class="absolute inset-y-0 right-3 flex items-center pr-1 text-gray-300">
                                🔍
                            </span>
                            <input 
                                type="text"
                                placeholder="מה ברצונך לעשות? (לדוגמה: שליחת תמונה)"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                class="w-full bg-white text-gray-800 pr-10 pl-4 py-3 rounded-xl shadow-inner focus:outline-none focus:ring-2 focus:ring-[#3B7D6E] text-base placeholder-gray-400"
                            />
                            {searchQuery && (
                                <button 
                                    onClick={() => setSearchQuery("")}
                                    class="absolute inset-y-0 left-3 flex items-center pl-1 text-gray-400 text-sm"
                                >
                                    ✕
                                </button>
                            )}
                        </div>
                    </header>

                    {/* Progress Bar & Interactive Summary */}
                    <div class="px-5 mt-4">
                        <div class="bg-white rounded-2xl p-4 shadow-sm border border-emerald-50/60">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-xs font-semibold text-[#2C5E53] bg-emerald-50 px-2.5 py-1 rounded-full">ההתקדמות שלך היום</span>
                                <div class="flex gap-2">
                                    <span class="text-xs text-gray-500">{stats.completed} מתוך {stats.total} שלבים בוצעו</span>
                                    {stats.completed > 0 && (
                                        <button 
                                            onClick={resetProgress}
                                            class="text-xs text-red-500 hover:underline font-bold"
                                        >
                                            איפוס
                                        </button>
                                    )}
                                </div>
                            </div>
                            <div class="w-full bg-gray-100 h-2.5 rounded-full overflow-hidden">
                                <div 
                                    class="bg-gradient-to-r from-emerald-400 to-[#3B7D6E] h-full transition-all duration-500 rounded-full"
                                    style={{ width: `${stats.percent}%` }}
                                ></div>
                            </div>
                        </div>
                    </div>

                    {/* Category Filter Tabs */}
                    <div class="flex px-5 gap-2 mt-4 overflow-x-auto pb-1 no-scrollbar">
                        <button 
                            onClick={() => setSelectedCategory("all")}
                            class={`px-4 py-2.5 rounded-xl font-semibold text-sm transition-all whitespace-nowrap flex items-center gap-1.5 ${
                                selectedCategory === "all" 
                                    ? "bg-[#2C5E53] text-white shadow-md shadow-[#2C5E53]/10" 
                                    : "bg-white text-gray-600 hover:bg-gray-50 border border-gray-100"
                            }`}
                        >
                            🌍 הכל
                        </button>
                        <button 
                            onClick={() => setSelectedCategory("whatsapp")}
                            class={`px-4 py-2.5 rounded-xl font-semibold text-sm transition-all whitespace-nowrap flex items-center gap-1.5 ${
                                selectedCategory === "whatsapp" 
                                    ? "bg-emerald-600 text-white shadow-md shadow-emerald-600/10" 
                                    : "bg-white text-gray-600 hover:bg-gray-50 border border-gray-100"
                            }`}
                        >
                            🟢 וואטסאפ
                        </button>
                        <button 
                            onClick={() => setSelectedCategory("android")}
                            class={`px-4 py-2.5 rounded-xl font-semibold text-sm transition-all whitespace-nowrap flex items-center gap-1.5 ${
                                selectedCategory === "android" 
                                    ? "bg-blue-600 text-white shadow-md shadow-blue-600/10" 
                                    : "bg-white text-gray-600 hover:bg-gray-50 border border-gray-100"
                            }`}
                        >
                            🤖 אנדרואיד
                        </button>
                        <button 
                            onClick={() => setSelectedCategory("iphone")}
                            class={`px-4 py-2.5 rounded-xl font-semibold text-sm transition-all whitespace-nowrap flex items-center gap-1.5 ${
                                selectedCategory === "iphone" 
                                    ? "bg-gray-800 text-white shadow-md" 
                                    : "bg-white text-gray-600 hover:bg-gray-50 border border-gray-100"
                            }`}
                        >
                            🍏 אייפון
                        </button>
                    </div>

                    {/* Active Guides List */}
                    <div class="px-5 mt-4 flex-1 space-y-3">
                        {filteredGuides.length > 0 ? (
                            filteredGuides.map((guide) => {
                                const isExpanded = expandedGuide === guide.id;
                                return (
                                    <div 
                                        key={guide.id} 
                                        class={`bg-white rounded-2xl border transition-all duration-300 overflow-hidden shadow-sm hover:shadow-md ${
                                            isExpanded 
                                                ? "border-[#3B7D6E] ring-1 ring-[#3B7D6E]/10" 
                                                : "border-gray-200/80"
                                        }`}
                                    >
                                        {/* Card Header (Expand/Collapse Trigger) */}
                                        <div 
                                            onClick={() => setExpandedGuide(isExpanded ? null : guide.id)}
                                            class="p-4 flex items-center justify-between cursor-pointer select-none"
                                        >
                                            <div class="flex items-center gap-3">
                                                <span class="text-2xl bg-[#F0F4F4] p-2 rounded-xl">{guide.icon}</span>
                                                <h3 class={`font-bold text-[#1A2B4C] leading-snug ${sizeClasses[textSize].title}`}>
                                                    {guide.title}
                                                </h3>
                                            </div>
                                            <div class="flex items-center gap-2">
                                                {/* Text-To-Speech Button */}
                                                <button 
                                                    onClick={(e) => toggleSpeech(guide.id, guide.title, guide.steps, e)}
                                                    class={`p-2 rounded-xl transition-colors ${
                                                        speakingId === guide.id 
                                                            ? "bg-red-50 text-red-500 animate-pulse" 
                                                            : "bg-gray-50 hover:bg-gray-100 text-[#2C5E53]"
                                                    }`}
                                                    title={speakingId === guide.id ? "עצור הקראה" : "הקרא בקול"}
                                                >
                                                    {speakingId === guide.id ? "⏸️" : "🔊"}
                                                </button>
                                                <span class="text-gray-400 text-lg transition-transform duration-300" style={{ transform: isExpanded ? 'rotate(180deg)' : 'rotate(0)' }}>
                                                    ▼
                                                </span>
                                            </div>
                                        </div>

                                        {/* Expandable Steps Section */}
                                        {isExpanded && (
                                            <div class="border-t border-gray-100 bg-[#FBFDFD] p-4 space-y-3">
                                                
                                                {/* Category Helper badge inside guide */}
                                                <div class="flex items-center justify-between pb-1 border-b border-gray-100">
                                                    <span class="text-xs font-semibold text-gray-400">
                                                        מקטע: {guide.category === 'whatsapp' ? '🟢 וואטסאפ' : guide.category === 'android' ? '🤖 אנדרואיד' : '🍏 אייפון'}
                                                    </span>
                                                    <span class="text-xs text-emerald-600 font-medium bg-emerald-50 px-2 py-0.5 rounded-full">
                                                        לחצו על כל שלב שביצעתם לסימון
                                                    </span>
                                                </div>

                                                <div class="space-y-2">
                                                    {guide.steps.map((step, idx) => {
                                                        const stepKey = `${guide.id}-${idx}`;
                                                        const isChecked = completedSteps[stepKey];
                                                        return (
                                                            <div 
                                                                key={idx}
                                                                onClick={(e) => toggleStep(guide.id, idx, e)}
                                                                class={`flex gap-3 items-start p-3 rounded-xl cursor-pointer step-transition border ${
                                                                    isChecked 
                                                                        ? "bg-emerald-50/40 border-emerald-100 text-gray-400" 
                                                                        : "bg-white border-gray-100 text-[#1E293B]"
                                                                }`}
                                                            >
                                                                {/* Interactive Step Index Circle */}
                                                                <span class={`flex items-center justify-center shrink-0 rounded-full font-bold ${sizeClasses[textSize].stepNum} ${
                                                                    isChecked 
                                                                        ? "bg-emerald-500 text-white" 
                                                                        : "bg-[#2C5E53]/15 text-[#2C5E53]"
                                                                }`}>
                                                                    {isChecked ? "✓" : idx + 1}
                                                                </span>

                                                                {/* Step Text content */}
                                                                <p class={`leading-relaxed ${sizeClasses[textSize].body} ${isChecked ? 'line-through decoration-emerald-200' : ''}`}>
                                                                    {step}
                                                                </p>
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                );
                            })
                        ) : (
                            <div class="bg-white rounded-2xl p-8 text-center border border-gray-200">
                                <p class="text-gray-400 text-3xl mb-2">🔍</p>
                                <p class="text-gray-500 font-bold">לא מצאנו מדריך התואם לחיפוש שלך</p>
                                <p class="text-xs text-gray-400 mt-1">נסו מילים פשוטות יותר (כמו "וואטסאפ" או "Wi-Fi")</p>
                            </div>
                        )}
                    </div>

                    {/* Permanent Floating Anchor (חבל ההצלה) */}
                    <div class="fixed bottom-0 left-0 right-0 max-w-md mx-auto p-4 bg-gradient-to-t from-[#F4F7F6] via-[#F4F7F6] to-transparent z-40">
                        <div class="bg-gradient-to-r from-[#D9EAE6] to-[#E3F2EE] border-2 border-[#2C5E53]/40 rounded-2xl p-4 shadow-lg flex items-start gap-3">
                            <span class="text-3xl shrink-0 mt-0.5">💡</span>
                            <div>
                                <h4 class="font-extrabold text-[#2C5E53] text-sm mb-1">חבל ההצלה הקבוע שלך</h4>
                                <p class="text-xs text-gray-700 leading-relaxed font-semibold">
                                    לא משנה איפה אתם במסך או אם נלחץ משהו בטעות – לחיצה אחת על מקש הבית העגול <span class="bg-white/80 px-1.5 py-0.5 rounded-md inline-block align-middle border border-gray-300">⚪</span> בתחתית הטלפון שלכם תחזיר אתכם מיד למסך הבית הראשי והבטוח.
                                </p>
                            </div>
                        </div>
                    </div>

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
