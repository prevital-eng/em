<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>פשוט וקל - מדריך כיס דיגיטלי</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0/dist/fuse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; }
body { font-family: 'Assistant', sans-serif; background: #F0FAF5; -webkit-tap-highlight-color: transparent; margin: 0; }
.no-scrollbar::-webkit-scrollbar { display: none; }
.no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
.step-fade { animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
/* 3D Tactile Button Styles */
.btn-3d {
border-bottom-width: 4px !important;
transition: transform 0.08s ease, border-bottom-width 0.08s ease;
}
.btn-3d:active {
transform: translateY(3px);
border-bottom-width: 1px !important;
}
.btn-3d-header {
border-bottom: 3px solid rgba(0,0,0,0.25) !important;
transition: transform 0.08s ease, border-bottom-width 0.08s ease;
}
.btn-3d-header:active {
transform: translateY(2px);
border-bottom-width: 0px !important;
margin-top: 2px;
}
</style>
</head>
<body>
<div id="root"></div>
<script src="guides-data.js"></script>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback } = React;

// Premium Crisp SVG Icons
const IconBasics = () => (
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 text-indigo-600">
<rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
<line x1="12" y1="18" x2="12.01" y2="18" strokeWidth="3" />
</svg>
);

const IconWhatsapp = () => (
<svg viewBox="0 0 24 24" fill="none" className="w-6 h-6">
<path d="M12 2C6.48 2 2 6.48 2 12c0 2.17.63 4.19 1.73 5.89L2.1 21.9l4.13-1.57C7.86 21.39 9.85 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z" fill="#128C7E"/>
<path d="M16.5 13.75c-.25-.13-1.5-.74-1.73-.83-.23-.08-.39-.13-.56.13-.16.25-.64.83-.79.99-.15.16-.3.18-.55.05a6.97 6.97 0 0 1-2.04-1.26 7.64 7.64 0 0 1-1.41-1.75c-.15-.25-.02-.39.11-.51.12-.11.25-.29.38-.44.13-.15.17-.25.26-.41.09-.16.05-.3-.02-.44-.06-.13-.56-1.35-.77-1.83-.2-.5-.41-.43-.56-.43h-.48c-.16 0-.43.06-.66.31-.22.25-.85.83-.85 2.03s.87 2.35.99 2.51c.12.16 1.7 2.6 4.12 3.65.58.25 1.03.4 1.38.51.58.18 1.11.16 1.53.1.47-.07 1.5-.61 1.71-1.2.21-.59.21-.11-.22-.18-.47-.31z" fill="white"/>
</svg>
);

const IconAndroid = () => (
<svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6 text-[#A4C639]">
<path d="M12 2a5 5 0 0 0-5 5v1h10V7a5 5 0 0 0-5-5zM5 9h2v8H5zm12 0h2v8h-2zM8 10h8v8a2 2 0 0 1-2 2h-4a2 2 0 0 1-2-2zm1.5-4a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5zm5 0a.75.75 0 1 1 0-1.5.75.75 0 0 1 0 1.5z"/>
</svg>
);

const IconApple = () => (
<svg viewBox="0 0 24 24" fill="currentColor" className="w-7 h-7 text-slate-700">
<path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 2.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42.93-.38-.21zM15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.21.67-2.93 1.49-.62.69-1.16 1.84-1.01 2.96 1.12.09 2.27-.58 2.95-1.39z"/>
</svg>
);

const IconGmail = () => (
<svg viewBox="0 0 24 24" fill="none" className="w-6 h-6">
<rect x="2" y="4" width="20" height="16" rx="3" fill="#E8EAED"/>
<path d="M22 6l-10 7L2 6" stroke="#EA4335" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
<path d="M2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6" stroke="#4285F4" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
</svg>
);

const IconCamera = () => (
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 text-amber-600">
<path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
<circle cx="12" cy="13" r="4"/>
</svg>
);

const IconNav = () => (
<svg viewBox="0 0 24 24" fill="none" className="w-6 h-6">
<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="#4285F4"/>
<circle cx="12" cy="9" r="3" fill="white"/>
</svg>
);

const IconZoom = () => (
<svg viewBox="0 0 24 24" fill="none" className="w-6 h-6">
<rect x="2" y="4" width="20" height="16" rx="4" fill="#2D8CFF" />
<path d="M6 9h6v6H6z" fill="white"/>
<path d="M14 10.5l4-3v9l-4-3z" fill="white" stroke="white" strokeWidth="1" strokeLinejoin="round"/>
</svg>
);

const IconAI = () => (
<svg viewBox="0 0 24 24" fill="currentColor" className="w-6 h-6 text-purple-600">
<path d="M12 2l1.9 4.9 4.9 1.9-4.9 1.9-1.9 4.9-1.9-4.9-4.9-1.9 4.9-1.9z" />
<path d="M19 13l1 2.5 2.5 1-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1z" />
</svg>
);

const IconBanking = () => (
<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 text-teal-700">
<path d="M3 21h18" />
<path d="M5 21V10M9 21V10M15 21V10M19 21V10" />
<path d="M2 10l10-6 10 6" />
</svg>
);

const IconHealth = () => (
<svg viewBox="0 0 24 24" fill="none" className="w-6 h-6">
<path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" fill="#E53E5C"/>
<path d="M9 12h2.2l.8-2 1.5 4 .8-2H16" stroke="white" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
</svg>
);

const IconPhotos = () => (
<svg viewBox="0 0 24 24" fill="none" className="w-6 h-6">
<rect x="3" y="5" width="14" height="14" rx="2" fill="#FBBF24"/>
<rect x="7" y="3" width="14" height="14" rx="2" fill="#FDE68A" stroke="#FBBF24" strokeWidth="1"/>
<circle cx="11" cy="9" r="1.6" fill="#B45309"/>
<path d="M8 14l2.2-2.4 1.8 1.6 2.4-2.8L18 14" stroke="#B45309" strokeWidth="1.4" strokeLinecap="round" strokeLinejoin="round" fill="none"/>
</svg>
);

// Categories mapping and visual setups
const CATS = [
{ key:"basics", label:"יסודות", renderIcon: () => <IconBasics />, borderClass:"border-b-indigo-600 border-indigo-100 hover:bg-indigo-50/30 text-indigo-600" },
{ key:"whatsapp", label:"וואטסאפ", renderIcon: () => <IconWhatsapp />, borderClass:"border-b-emerald-600 border-emerald-100 hover:bg-emerald-50/30 text-emerald-600" },
{ key:"android", label:"אנדרואיד", renderIcon: () => <IconAndroid />, borderClass:"border-b-green-600 border-green-100 hover:bg-green-50/30 text-green-600" },
{ key:"iphone", label:"אייפון", renderIcon: () => <IconApple />, borderClass:"border-b-slate-600 border-slate-100 hover:bg-slate-50/30 text-slate-700" },
{ key:"gmail", label:"מייל", renderIcon: () => <IconGmail />, borderClass:"border-b-red-600 border-red-100 hover:bg-red-50/30 text-[#EA4335]" },
{ key:"camera", label:"צילום", renderIcon: () => <IconCamera />, borderClass:"border-b-amber-600 border-amber-100 hover:bg-amber-50/30 text-amber-600" },
{ key:"nav", label:"ניווט", renderIcon: () => <IconNav />, borderClass:"border-b-blue-600 border-blue-100 hover:bg-blue-50/30 text-blue-600" },
{ key:"zoom", label:"זום", renderIcon: () => <IconZoom />, borderClass:"border-b-sky-600 border-sky-100 hover:bg-sky-50/30 text-sky-600" },
{ key:"ai", label:"AI", renderIcon: () => <IconAI />, borderClass:"border-b-purple-600 border-purple-100 hover:bg-purple-50/30 text-purple-600" },
{ key:"banking", label:"בנקאות", renderIcon: () => <IconBanking />, borderClass:"border-b-teal-700 border-teal-100 hover:bg-teal-50/30 text-teal-700" },
{ key:"health", label:"בריאות", renderIcon: () => <IconHealth />, borderClass:"border-b-rose-600 border-rose-100 hover:bg-rose-50/30 text-rose-600" },
{ key:"photos", label:"תמונות", renderIcon: () => <IconPhotos />, borderClass:"border-b-amber-500 border-amber-100 hover:bg-amber-50/30 text-amber-600" },
];

const catByKey = Object.fromEntries(CATS.map(c=>[c.key,c]));

function ConfirmDialog({ onConfirm, onCancel }) {
return (
<div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 px-6">
<div className="bg-white rounded-2xl p-6 shadow-2xl max-w-xs w-full text-center">
<p className="text-gray-800 font-bold text-lg mb-5">לאפס את כל הסימונים?</p>
<div className="flex gap-3">
<button onClick={onCancel} className="flex-1 py-3 rounded-xl border border-gray-200 text-gray-600 font-semibold">ביטול</button>
<button onClick={onConfirm} className="flex-1 py-3 rounded-xl bg-red-500 text-white font-bold">אפס</button>
</div>
</div>
</div>
);
}

function AboutDialog({ onCancel }) {
return (
<div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/40 px-6">
<div className="bg-white rounded-2xl p-6 shadow-2xl max-w-xs w-full text-center space-y-4">
<div className="text-4xl">📱</div>
<h3 className="text-xl font-bold text-gray-800">פשוט וקל - מדריך כיס דיגיטלי</h3>
<p className="text-gray-500 text-sm leading-relaxed">
האפליקציה נוצרה מתוך רצון להנגיש את עולם הסמארטפונים והטכנולוגיה לכולם, בצורה פשוטה, ממוקדת ובגובה העיניים.
</p>
<div className="bg-blue-50 p-3 rounded-xl border border-blue-100 text-xs text-blue-900 leading-relaxed font-semibold">
כתיבת האפליקציה קיבלה השראה מפרסום <span className="underline">חוברת מעודכנת הנחיות לסלולארי 12.6.26-1.pdf</span> מאת עמליה גולדברג.
</div>
<div className="text-xs text-gray-400 font-extrabold pt-2 border-t border-gray-100">
כל הזכויות שמורות לרויטל ולעמליה © 2026
</div>
<button onClick={onCancel} className="w-full py-3 rounded-xl bg-green-500 text-white font-bold btn-3d border border-b-green-700 border-green-500">סגור</button>
</div>
</div>
);
}

function App() {
const [selectedCat, setSelectedCat] = useState(null);
const [searchQuery, setSearchQuery] = useState("");
const [completedSteps, setCompletedSteps] = useState({});
const [expandedGuide, setExpandedGuide] = useState(null);
const [showConfirm, setShowConfirm] = useState(false);
const [showAbout, setShowAbout] = useState(false);

useEffect(() => {
try {
const s = localStorage.getItem("pv_steps");
if(s) setCompletedSteps(JSON.parse(s));
} catch(e) {}
},[]);

const saveCompleted = (u) => {
setCompletedSteps(u);
try { localStorage.setItem("pv_steps", JSON.stringify(u)); } catch(e) {}
};

const toggleStep = (gId, idx, e) => {
e.stopPropagation();
const k = `${gId}-${idx}`;
saveCompleted({...completedSteps, [k]: !completedSteps[k]});
};

const handleResetConfirmed = () => {
saveCompleted({});
try { localStorage.removeItem("pv_steps"); } catch(e) {}
setShowConfirm(false);
};

// Fuse.js semantic fuzzy search
const fuse = useMemo(() => new Fuse(guidesData, {
keys: [
{ name: "title", weight: 0.6 },
{ name: "steps", weight: 0.4 }
],
threshold: 0.45,
includeScore: true,
ignoreLocation: true,
minMatchCharLength: 2,
}), []);

const filteredGuides = useMemo(() => {
const q = searchQuery.trim();
if (!q) return guidesData.filter(g => !selectedCat || g.category === selectedCat);
const results = fuse.search(q)
.map(r => r.item)
.filter(g => !selectedCat || g.category === selectedCat);
return results;
}, [selectedCat, searchQuery, fuse]);

// Category stats mapping
const getCatStats = (catKey) => {
const catGuides = guidesData.filter(g => g.category === catKey);
let total = 0, done = 0;
catGuides.forEach(g => g.steps.forEach((_, i) => {
total++;
if (completedSteps[`${g.id}-${i}`]) done++;
}));
return { total, done, pct: total > 0 ? Math.round(done/total*100) : 0 };
};

// Progress score tracker
const stats = useMemo(() => {
let total = 0, done = 0;
filteredGuides.forEach(g => g.steps.forEach((_, i) => {
total++;
if (completedSteps[`${g.id}-${i}`]) done++;
}));
return { total, done, pct: total > 0 ? Math.round(done/total*100) : 0 };
}, [filteredGuides, completedSteps]);

const guideProgress = (g) => {
const done = g.steps.filter((_, i) => completedSteps[`${g.id}-${i}`]).length;
return { done, total: g.steps.length };
};

const [copiedGuide, setCopiedGuide] = useState(null);

const copyGuide = useCallback((guide) => {
const text = `📋 ${guide.title}\n\n` + guide.steps.map((s, i) => `${i+1}. ${s}`).join('\n\n');
navigator.clipboard.writeText(text).then(() => {
setCopiedGuide(guide.id);
setTimeout(() => setCopiedGuide(null), 2500);
}).catch(() => {
// fallback for older browsers
const ta = document.createElement('textarea');
ta.value = text;
document.body.appendChild(ta);
ta.select();
document.execCommand('copy');
document.body.removeChild(ta);
setCopiedGuide(guide.id);
setTimeout(() => setCopiedGuide(null), 2500);
});
}, []);

const catMeta = catByKey[selectedCat];

return (
<div className="max-w-md mx-auto min-h-screen flex flex-col relative pb-10" style={{background:"#F0FAF5", boxShadow: "0 0 20px rgba(0,0,0,0.05)"}}>
{showConfirm && <ConfirmDialog onConfirm={handleResetConfirmed} onCancel={() => setShowConfirm(false)} />}
{showAbout && <AboutDialog onCancel={() => setShowAbout(false)} />}

{/* Header Section */}
<header style={{background:"linear-gradient(135deg,#1A6FB5 0%,#1589CC 100%)"}}
className="text-white px-4 shadow-md sticky top-0 z-50 transition-all duration-300 rounded-b-[1.5rem]">
{/* Quick navigation header bar */}
<div className="flex items-center justify-between py-3">
<div className="flex items-center gap-2">
<button onClick={() => {setSelectedCat(null); setExpandedGuide(null); setSearchQuery("");}}
className="w-10 h-10 flex items-center justify-center rounded-xl bg-white/20 hover:bg-white/30 font-bold text-lg transition-all btn-3d-header"
aria-label="חזרה לדף הבית">🏠</button>
{catMeta ? (
<div className="flex items-center gap-2 bg-black/10 px-3 py-1.5 rounded-full border border-white/10">
{catMeta.renderIcon()}
<span className="font-bold text-sm tracking-wide">{catMeta.label}</span>
</div>
) : (
<span className="font-extrabold text-xl tracking-tight flex items-center gap-1.5">📱 פשוט וקל</span>
)}
</div>
{/* About Info Button */}
<button onClick={() => setShowAbout(true)}
className="w-10 h-10 flex items-center justify-center rounded-xl bg-white/20 hover:bg-white/30 font-bold text-lg transition-all btn-3d-header"
aria-label="אודות">ℹ️</button>
</div>
</header>

{/* ── SEARCH & FILTER ROW (Visible always) ── */}
<div className="px-4 pt-4">
<div className="relative">
<span className="absolute inset-y-0 right-4 flex items-center text-blue-500 text-xl pointer-events-none">🔍</span>
<input type="text"
placeholder={selectedCat ? `חיפוש במדריכי ${catMeta?.label || ""}...` : "כתבו בחופשיות מה אתם צריכים עזרה בו..."}
value={searchQuery}
onChange={e => setSearchQuery(e.target.value)}
className="w-full bg-white text-gray-800 pr-12 pl-10 py-4 rounded-2xl text-base font-semibold placeholder-gray-400 focus:outline-none"
style={{
border: "2.5px solid #2db8a0",
boxShadow: "0 3px 0px #0d6e5f, 0 4px 16px rgba(45,184,160,0.18)",
fontSize: "1.05rem"
}}
onFocus={e => { e.target.style.border = "2.5px solid #0d6e5f"; e.target.style.boxShadow = "0 3px 0px #0a5a4f, 0 4px 20px rgba(45,184,160,0.28)"; }}
onBlur={e => { e.target.style.border = "2.5px solid #2db8a0"; e.target.style.boxShadow = "0 3px 0px #0d6e5f, 0 4px 16px rgba(45,184,160,0.18)"; }}
/>
{searchQuery && <button onClick={() => setSearchQuery("")} className="absolute inset-y-0 left-3 flex items-center text-gray-400 hover:text-red-400 text-lg font-bold">✕</button>}
</div>
</div>

{/* ── HOME SCREEN CONTENT (No Category Selected & No Active Query) ── */}
{!selectedCat && !searchQuery && (
<div className="flex-1 flex flex-col px-4 pt-4 pb-8 space-y-6">
{/* Friendly Welcome Card */}
<div className="bg-white rounded-2xl p-5 shadow-sm border border-blue-50/50 text-center space-y-2">
<span className="text-4xl">👋</span>
<h2 className="text-xl font-extrabold text-gray-800">שלום! מה תרצו ללמוד היום?</h2>
<p className="text-gray-500 text-sm">בחרו את אחד הנושאים למטה, או הקלידו שאלה בשורת החיפוש למעלה.</p>
</div>

{/* Interactive Category Grid (Compact 3-column layout with 3D press response) */}
<div className="space-y-3">
<h3 className="text-base font-bold text-gray-700 px-1">נושאי לימוד זמינים:</h3>
<div className="grid grid-cols-3 gap-2">
{CATS.map(cat => {
const catStats = getCatStats(cat.key);
return (
<button key={cat.key}
onClick={() => {setSelectedCat(cat.key); setExpandedGuide(null); setSearchQuery("");}}
className={`bg-white rounded-2xl p-2 text-center border border-gray-200/50 shadow-sm hover:shadow-md transition-all flex flex-col items-center justify-center h-20 relative overflow-hidden group btn-3d ${cat.borderClass}`}>
<div className="absolute top-0 left-0 w-1 h-full bg-[#1589CC]/10 group-hover:bg-[#1589CC]/30 transition-all" />
<div className="bg-gray-50 p-1 rounded-xl shrink-0 mb-1">
{cat.renderIcon()}
</div>
<div className="w-full text-center">
<h4 className="font-extrabold text-[#1A2B4C] text-[11px] leading-tight truncate">{cat.label}</h4>
</div>
{catStats.done > 0 && (
<span className="absolute top-1 right-1 text-[9px] font-extrabold px-1 rounded-full bg-green-50 text-green-700 border border-green-200">
{catStats.pct}%
</span>
)}
</button>
);
})}
</div>
</div>
</div>
)}

{/* ── ACTIVE LIST VIEW (Category Selected or Search Active) ── */}
{(selectedCat || searchQuery) && (
<div className="flex-1 flex flex-col pt-3">
{/* Collapsible Accordion Guide Lists */}
<div className="px-4 pb-8 flex-1 space-y-3">
{searchQuery && filteredGuides.length > 0 && (
<p className="text-xs font-bold text-green-700 px-1">תוצאות חיפוש מתאימות ביותר:</p>
)}
{filteredGuides.length > 0 ? filteredGuides.map((guide, gIdx) => {
// Expand guide if actively clicked OR if it's the single best search result matching query
const isExpanded = expandedGuide === guide.id || (searchQuery.trim().length > 1 && filteredGuides.length <= 2 && gIdx === 0);
const cat = catByKey[guide.category];
const prog = guideProgress(guide);
const allDone = prog.done === prog.total && prog.total > 0;
return (
<div key={guide.id} className={`bg-white rounded-2xl border transition-all duration-300 overflow-hidden shadow-sm ${isExpanded ? "border-green-400 ring-2 ring-green-100" : "border-gray-200/80 hover:shadow-md"}`}>
<button onClick={() => setExpandedGuide(isExpanded ? "" : guide.id)}
className={`w-full text-right p-4 flex items-center justify-between gap-3 focus:outline-none btn-3d ${isExpanded ? "border-b-green-500" : "border-b-gray-300"}`}>
<div className="flex-1 min-w-0">
<div className="flex items-center gap-2 mb-1">
{!selectedCat && <span className="text-xs bg-gray-100 text-gray-500 px-2 py-0.5 rounded-md font-semibold">{cat?.label}</span>}
</div>
<p className="font-extrabold text-gray-800 leading-snug text-base md:text-lg">{guide.title}</p>
</div>
<span className="text-gray-400 text-lg shrink-0 transition-transform duration-300" style={{transform: isExpanded ? "rotate(180deg)" : "rotate(0)"}}>▼</span>
</button>
{isExpanded && (
<div className="step-fade border-t border-gray-100 px-4 pb-4 pt-3 bg-gray-50/30">
{/* Steps List */}
<div className="space-y-1">
{guide.steps.map((step, idx) => {
const isLast = idx === guide.steps.length - 1;
return (
<div key={idx}>
<div className="flex gap-3 items-start p-3 rounded-xl bg-white border border-b-gray-300 border-gray-200 text-gray-700">
<span className="shrink-0 w-6 h-6 rounded-full flex items-center justify-center text-xs font-bold mt-0.5 bg-blue-100 text-blue-700 border border-blue-200">
{idx + 1}
</span>
<p className="leading-relaxed flex-1 text-base md:text-lg text-gray-700">{step}</p>
</div>
{!isLast && (
<div className="flex justify-center py-0.5 text-green-300 text-base select-none pointer-events-none">↓</div>
)}
</div>
);
})}
</div>
{/* Copy Button */}
<div className="mt-3 flex justify-end">
<button
onClick={() => copyGuide(guide)}
className={`flex items-center gap-2 px-4 py-2.5 rounded-xl text-sm font-bold transition-all border btn-3d ${copiedGuide === guide.id ? "bg-green-50 border-green-400 border-b-green-600 text-green-700" : "bg-white border-gray-200 border-b-gray-400 text-gray-600 hover:bg-blue-50 hover:border-blue-300 hover:text-blue-700"}`}>
{copiedGuide === guide.id ? (
<><span>✓</span><span>הועתק!</span></>
) : (
<><span>📋</span><span>העתק הדרכה</span></>
)}
</button>
</div>
</div>
)}
</div>
);
}) : (
<div className="bg-white rounded-2xl p-8 text-center border border-gray-200">
<p className="text-gray-300 text-4xl mb-3">🔍</p>
<p className="text-gray-600 font-bold">לא נמצא מדריך מתאים</p>
<p className="text-xs text-gray-400 mt-1 mb-4">נסו לחפש מילים קצרות יותר כמו "וואטסאפ", "נעילה" או "וויפי".</p>
<button onClick={() => {setSearchQuery(""); setSelectedCat(null);}} className="px-5 py-2.5 text-white rounded-xl font-bold text-sm btn-3d border border-b-green-700 border-green-500" style={{background:"#34C97A"}}>נקה חיפוש</button>
</div>
)}
</div>
</div>
)}
</div>
);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
