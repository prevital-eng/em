<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>פשוט וקל - מדריך כיס דיגיטלי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght=300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Assistant', sans-serif; background: #F0FAF5; -webkit-tap-highlight-color: transparent; margin: 0; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .step-fade { animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(5px); } to { opacity:1; transform:translateY(0); } }
        
        /* 3D Tactile Button Styles */
        .btn-3d {
            border-bottom-width: 4px !important;
            transition: transform 0.08s ease, border-bottom-width 0.08s ease;
        }
        .btn-3d:active {
            transform: translateY(3px);
            border-bottom-width: 1px !important;
        }

        .btn-3d-header {
            border-bottom: 3px solid rgba(0,0,0,0.25) !important;
            transition: transform 0.08s ease, border-bottom-width 0.08s ease;
        }
        .btn-3d-header:active {
            transform: translateY(2px);
            border-bottom-width: 0px !important;
            margin-top: 2px;
        }
    </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Premium Crisp SVG Icons
    const IconBasics = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 text-indigo-600">
            <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
            <line x1="12" y1="18" x2="12.01" y2="18" strokeWidth="3" />
        </svg>
    );

    const IconWhatsapp = () => (
        <svg viewBox="0 0 24 24" fill="none" className="w-6 h-6">
            <path d="M12 2C6.48 2 2 6.48 2 12c0 2.17.63 4.19 1.73 5.89L2.1 21.9l4.13-1.57C7.86 21.39 9.85 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z" fill="#128C7E"/>
            <path d="M16.5 13.75c-.25-.13-1.5-.74-1.73-.83-.23-.08-.39-.13-.56.13-.16.25-.64.83-.79.99-.15.16-.3.18-.55.05a6.97 6.97 0 0 1-2.04-1.26 7.64 7.64 0 0 1-1.41-1.75c-.15-.25-.02-.39.11-.51.12-.11.25-.29.38-.44.13-.15.17-.25.26-.41.09-.16.05-.3-.02-.44-.06-.13-.56-1.35-.77-1.83-.2-.5-.41-.43-.56-.43h-.48c-.16 0-.43.06-.66.31-.22.25-.85.83-.85 2.03s.87 2.35.99 2.51c.12.16 1.7 2.6 4.12 3.65.58.25 1.03.4 1.38.51.58.18 1.11.16 1.53.1.47-.07 1.5-.61 1.71-1.2.21-.59.21-.11-.22-.18-.47-.31z" fill="white"/>
        </svg>
    );

    const IconZoom = () => (
        <svg viewBox="0 0 24 24" fill="none" className="w-6 h-6">
            <rect x="2" y="4" width="20" height="16" rx="4" fill="#2D8CFF" />
            <path d="M6 9h6v6H6z" fill="white"/>
            <path d="M14 10.5l4-3v9l-4-3z" fill="white" stroke="white" strokeWidth="1" strokeLinejoin="round"/>
        </svg>
    );

    const IconLinks = () => (
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className="w-6 h-6 text-teal-600">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" />
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71" />
        </svg>
    );

    // Categories mapping and visual setups
    const CATS = [
        { key:"basics",   label:"יסודות",   renderIcon: () => <IconBasics />, borderClass:"border-b-indigo-600 border-indigo-100 hover:bg-indigo-50/30 text-indigo-600" },
        { key:"whatsapp", label:"וואטסאפ",  renderIcon: () => <IconWhatsapp />, borderClass:"border-b-emerald-600 border-emerald-100 hover:bg-emerald-50/30 text-emerald-600" },
        { key:"zoom",     label:"זום",      renderIcon: () => <IconZoom />, borderClass:"border-b-sky-600 border-sky-100 hover:bg-sky-50/30 text-sky-600" },
        { key:"links",    label:"קישורים",  renderIcon: () => <IconLinks />, borderClass:"border-b-teal-600 border-teal-100 hover:bg-teal-50/30 text-teal-600" }
    ];
    const catByKey = Object.fromEntries(CATS.map(c=>[c.key,c]));

    // Fully comprehensive and clean unvoweled guide data
    const guidesData = [
        {id:"bas-3",category:"basics",title:"איך מבצעים שיחת טלפון רגילה?",steps:["פתחו את אפליקציית הטלפון (סמל שפופרת ירוקה או כחולה).","לחצו על סמל לוח החיוג (ריבוע עם נקודות) כדי לפתוח את המקלדת המספרית.","הקלידו את מספר הטלפון המלא כולל קידומת (050, 052 וכו').","לחצו על כפתור החיוג הירוק להתחלת השיחה, ועל הכפתור האדום לסיום."]},
        {id:"bas-12",category:"basics",title:"הסמלים הקטנים בסרגל העליון ופתיחת הווילון",steps:["החליקו את האצבע מהחלק העליון ביותר של המסך כלפי מטה כדי לפתוח את וילון ההגדרות המהירות.","📶 Wi-Fi (גלים או פסים) — פסים מלאים = מחוברים לאינטרנט.","🔋 סוללה — ירוק = תקין. כתום = מתחת ל-30%. אדום = מתחת ל-10%.","🔕 מצב שקט, 🌙 נא לא להפריע, ✈️ מצב טיסה ללא קליטה כלל."]},
        {id:"wa-11",category:"whatsapp",title:"איך שולחים מיקום נוכחי ובזמן אמת?",steps:["ודאו שרכיב המיקום (GPS) מופעל בטלפון שלכם בווילון העליון.","היכנסו לשיחה של האדם שברצונכם לשלוח לו את המיקום בוואטסאפ.","לחצו על סמל הסיכה (📎) או סמל הפלוס (+) שליד שורת כתיבת ההודעה.","בחרו באפשרות 'מיקום' וביחרו בשיתוף נוכחי או בזמן אמת."]},
        {id:"zm-1",category:"zoom",title:"כפתור 'הרם יד' (Raise Hand) - מתי ואיך להשתמש? ✋",steps:["בזמן השיחה, לחצו על כפתור Reactions (סמל של סמיילי מחייך עם פלוס) בתחתית המסך.","בתפריט הקטן שייפתח, לחצו על כפתור Raise Hand.","המנחה או המרצה יראו מיד אייקון של יד מורמת לצד השם שלכם וידעו שאתם מבקשים את רשות הדיבור.","זה שומר על סדר המפגש ומבטיח שלא יפספסו את התור שלכם לבטא את דעתכם!"]},
        {id:"zm-2",category:"zoom",title:"איך מקליטים את מפגש הזום למחשב?",steps:["ודאו מראש עם מארח הפגישה (Host) שהוא מאשר ומאפשר לכם להקליט.","במהלך הפגישה, חפשו בתפריט התחתון כפתור בשם Record (סמל של עיגול).","לחצו עליו כדי להתחיל את ההקלטה. תוכלו לעצור אותה בכל שלב באותו המקום.","עם סיום השיחה ויציאה מהחדר, קובץ הווידאו יישמר אוטומטית במחשב."]},
        {id:"zm-3",category:"zoom",title:"בדיקת שמע ומיקרופון לפני כניסה למפגש 🎧",steps:["למניעת תקלות שמע מביכות, בצעו את הבדיקה לפני ההתחברות הרשמית.","רגע לפני הכניסה לשיחה, זום יציע לכם כפתור בשם Test Speaker & Microphone. לחצו עליו.","המחשב ישמיע לכם צליל בדיקה ויבקש מכם לדבר קצרות כדי לוודא חזרה תקינה.","כך מוודאים שהרמקולים והמיקרופון מכוונים ועובדים בצורה מעולה ותקינה."]},
        {id:"lnk-1",category:"links",title:"מספרי חירום לחיוג מהיר",steps:["משטרת ישראל — מוקד 100","מגן דוד אדום — מוקד 101","לוחמי האש (כיבוי והצלה) — מוקד 102","פיקוד העורף — מוקד 104"]}
    ];

    function App() {
        const [activeTab, setActiveTab] = useState("basics");
        const [selectedGuide, setSelectedGuide] = useState(null);
        const [searchQuery, setSearchQuery] = useState("");
        const [copied, setCopied] = useState(false);

        const filteredGuides = useMemo(() => {
            return guidesData.filter(guide => {
                const matchesTab = guide.category === activeTab;
                const matchesSearch = guide.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                      guide.steps.some(step => step.toLowerCase().includes(searchQuery.toLowerCase()));
                return matchesTab && (searchQuery === "" || matchesSearch);
            });
        }, [activeTab, searchQuery]);

        const handleCopyGuide = (guide) => {
            if (!guide) return;
            const stepsText = guide.steps.map((step, idx) => `${idx + 1}. ${step}`).join("\n");
            const fullTextToCopy = `*${guide.title}*\n\n${stepsText}`;
            
            navigator.clipboard.writeText(fullTextToCopy).then(() => {
                setCopied(true);
                setTimeout(() => setCopied(false), 2000);
            }).catch(err => {
                console.error("שגיאה בהעתקה: ", err);
            });
        };

        return (
            <div className="max-w-md mx-auto min-h-screen flex flex-col pb-20 select-none">
                {/* Header */}
                <header className="bg-gradient-to-r from-emerald-600 to-teal-700 text-white p-5 pt-7 shadow-md rounded-b-3xl sticky top-0 z-50">
                    <div className="flex justify-between items-center mb-4">
                        <h1 className="text-2xl font-extrabold tracking-tight">פשוט וקל 📱</h1>
                        <p className="text-sm opacity-90 font-semibold bg-emerald-800/40 px-3 py-1 rounded-full">מדריך כיס</p>
                    </div>
                    {/* Search Bar */}
                    <div className="relative">
                        <input 
                            type="text" 
                            placeholder="חפשו מדריך או פעולה..." 
                            className="w-full p-3.5 pr-11 rounded-2xl text-slate-800 bg-white/95 focus:outline-none shadow-inner text-base font-medium placeholder-slate-400"
                            value={searchQuery}
                            onChange={(e) => setSearchQuery(e.target.value)}
                        />
                        <span className="absolute right-4 top-4 text-slate-400">🔍</span>
                        {searchQuery && (
                            <button onClick={() => setSearchQuery("")} className="absolute left-4 top-3.5 text-slate-400 text-lg">✕</button>
                        )}
                    </div>
                </header>

                {/* Categories Navigation */}
                <div className="p-3 overflow-x-auto no-scrollbar flex gap-2.5 bg-white shadow-sm border-b border-slate-100 sticky top-[148px] z-40">
                    {CATS.map((cat) => {
                        const isSelected = activeTab === cat.key;
                        return (
                            <button
                                key={cat.key}
                                onClick={() => { setActiveTab(cat.key); setSelectedGuide(null); }}
                                className={`flex items-center gap-2 px-4 py-2.5 rounded-xl font-bold text-sm whitespace-nowrap border-b-[3px] transition-all ${
                                    isSelected 
                                    ? "bg-slate-100 border-slate-800 text-slate-900 shadow-sm scale-102" 
                                    : "bg-slate-50/60 border-transparent text-slate-500 hover:bg-slate-50"
                                }`}
                            >
                                {cat.renderIcon()}
                                {cat.label}
                            </button>
                        );
                    })}
                </div>

                {/* Main Content Area */}
                <main className="flex-1 p-4">
                    {selectedGuide ? (
                        /* Step by Step Guide View */
                        <div className="bg-white rounded-3xl p-5 shadow-sm border border-slate-100 step-fade">
                            <div className="flex justify-between items-center mb-6">
                                <button 
                                    onClick={() => { setSelectedGuide(null); setCopied(false); }} 
                                    className="flex items-center gap-1 text-emerald-600 font-bold text-sm btn-3d-header px-3 py-1.5 bg-emerald-50 rounded-xl"
                                >
                                    🏃‍♂️ חזרה לרשימה
                                </button>
                                <button 
                                    onClick={() => handleCopyGuide(selectedGuide)} 
                                    className={`flex items-center gap-1.5 font-bold text-sm btn-3d-header px-3 py-1.5 rounded-xl transition-all ${
                                        copied ? "bg-teal-600 text-white" : "bg-slate-100 text-slate-700"
                                    }`}
                                >
                                    {copied ? "✅ הועתק!" : "📋 העתקת המדריך"}
                                </button>
                            </div>
                            <h2 className="text-xl font-extrabold text-slate-800 mb-5 border-b pb-3 border-slate-100">{selectedGuide.title}</h2>
                            <div className="space-y-4">
                                {selectedGuide.steps.map((step, idx) => (
                                    <div key={idx} className="flex gap-3 items-start bg-slate-50/60 p-4 rounded-2xl border border-slate-100">
                                        <span className="flex items-center justify-center bg-emerald-600 text-white font-extrabold text-sm w-6 h-6 rounded-full shrink-0 mt-0.5 shadow-sm">
                                            {idx + 1}
                                        </span>
                                        <p className="text-slate-700 leading-relaxed font-medium text-base">{step}</p>
                                    </div>
                                ))}
                            </div>
                        </div>
                    ) : (
                        /* Guides List View */
                        <div className="space-y-3">
                            {filteredGuides.length > 0 ? (
                                filteredGuides.map((guide) => (
                                    <button
                                        key={guide.id}
                                        onClick={() => setSelectedGuide(guide)}
                                        className="w-full text-right p-4 bg-white rounded-2xl shadow-sm border border-slate-100 hover:border-slate-200 transition-all active:bg-slate-50/80 flex justify-between items-center btn-3d border-b-slate-300"
                                    >
                                        <span className="font-bold text-slate-800 text-base pl-2">{guide.title}</span>
                                        <span className="text-slate-300 text-xl font-light shrink-0">◀</span>
                                    </button>
                                ))
                            ) : (
                                <div className="text-center py-12 bg-white rounded-3xl border border-slate-100 p-6">
                                    <p className="text-slate-400 text-lg font-bold mb-1">לא מצאנו מדריך מתאים</p>
                                    <p className="text-slate-400 text-sm">נסו לחפש מילה אחרת או להחליף קטגוריה</p>
                                </div>
                            )}
                        </div>
                    )}
                </main>

                {/* Footer Disclaimer */}
                <footer className="text-center text-slate-400 text-xs p-4 mt-auto">
                    פשוט וקל - מוגש באהבה ❤️
                </footer>
            </div>
        );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
